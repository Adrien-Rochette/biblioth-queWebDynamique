<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="includes/styles/styles.css">
</head>
<body>

<main class="container">
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="burgerButton">
        <img src="images/burgerButton.png" alt="Menu" class="menu">
    </label>
    <aside class="sidebar">
        <div class="offset">
            fhzoidfoize
        </div>
        <div class="brand">
            <img src="images/pileLivre.png" alt="Logo Library" class="logo-img">
            <h1 class="brand-title">Library</h1>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html" class="active">Accueil</a></li>
                <li><a href="livres.html">Livres</a></li>
                <li><a href="auteur.html">Auteurs</a></li>
                <li><a href="user.html">Utilisateurs</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </aside>

    <section class="main-content">
        <header class="content-header">
            <h1 class="page-title">Dashboard</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <img src="images/livres.png" alt="Icône Livres" class="card-icon">
                <div class="card-details">
                    <span class="stat-number">X</span>
                    <span class="stat-label">livres</span>
                </div>
            </div>

            <div class="stat-card">
                <img src="images/stylo.png" alt="Icône Auteurs" class="card-icon">
                <div class="card-details">
                    <span class="stat-number">Y</span>
                    <span class="stat-label">auteurs</span>
                </div>
            </div>

            <div class="stat-card">
                <img src="images/perso.png" alt="Icône Utilisateurs" class="card-icon">
                <div class="card-details">
                    <span class="stat-number">Z</span>
                    <span class="stat-label">utilisateurs</span>
                </div>
            </div>

            <div class="stat-card">
                <img src="images/box.png" alt="Icône Emprunts" class="card-icon">
                <div class="card-details">
                    <span class="stat-number">A</span>
                    <span class="stat-label">emprunts</span>
                </div>
            </div>
        </div>
    </section>
</main>

</body>
</html>
