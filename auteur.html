<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="includes/styles/styles.css">
</head>
<body>

<main class="container">
    <aside class="sidebar">
        <div class="brand">
            <img src="images/pileLivre.png" alt="Logo Library" class="logo-img">
            <h1 class="brand-title">Library</h1>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html" class="active">Accueil</a></li>
                <li><a href="livres.html">Livres</a></li>
                <li><a href="auteur.html">Auteurs</a></li>
                <li><a href="user.html">Utilisateurs</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </aside>

    <section class="main-content">
        <header class="content-header">
            <h1 class="page-title">Auteurs</h1>
        </header>
        <div class="colonne-auth">
        <div class="stats-grid">
            <div class="auth-card">
                <img src="images/aristideCesar.png" alt="Aristide Napoleon" class="auth-icon">
                <div class="auth-card-details">
                    <h2>Naporistide</h2>
                    <span class="stat-number">X</span>
                    <span class="stat-label">livres</span>
                </div>
            </div>



            <div class="auth-card">
                <img src="images/Che_GueSem.png" alt="C'est Che Guevara mais en semrick" class="auth-icon">
                <div class="auth-card-details">
                    <h2>Che Guesemrick</h2>
                    <span class="stat-number">Y</span>
                    <span class="stat-label">livres</span>
                </div>
            </div>
        </div>
        <div class="stats-grid">
            <div class="auth-card">
                <img src="images/lePremierHommeModerne.png" alt="Le premier homme moderne" class="auth-icon">
                <div class="auth-card-details">
                    <h2>Abdel, 1er homo moderne</h2>
                    <span class="stat-number">X</span>
                    <span class="stat-label">livres</span>
                </div>
            </div>
            <div class="auth-card">
                <img src="images/Imad_de_Vinci.png" alt="La joconde" class="auth-icon">
                <div class="auth-card-details">
                    <h2>Imad de Vinci</h2>
                    <span class="stat-number">X</span>
                    <span class="stat-label">livres</span>
                </div>
            </div>
        </div>
        </div>
    </section>
</main>

</body>
</html>
